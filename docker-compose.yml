services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: niva
      POSTGRES_PASSWORD: niva
      POSTGRES_DB: niva
    ports:
      - "5432:5432"
    volumes:
      - niva_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niva"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://niva:niva@db:5432/niva
      JWT_SECRET: change-me-in-prod
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OWM_API_KEY: ${OWM_API_KEY:-}
      SENTINEL_CLIENT_ID: ${SENTINEL_CLIENT_ID:-}
      SENTINEL_CLIENT_SECRET: ${SENTINEL_CLIENT_SECRET:-}
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  niva_pgdata:
